<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | GioDev</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to GioDev's homepage.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="https://i.imgur.com/PDJfk20.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #050505;
      --color-accent: #e0e0e0;
      --color-text: #f0f0f0;
      --color-text-muted: #777777;
      --color-border: rgba(255, 255, 255, 0.06);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Space Grotesk', system-ui, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--color-bg); color: var(--color-text); font-family: var(--font-body);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .grain-overlay {
      position: fixed; top: -50%; left: -50%; right: -50%; bottom: -50%;
      width: 200%; height: 200%;
      background: transparent url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E") repeat;
      pointer-events: none; z-index: 0; opacity: 0.5;
      animation: grainShift 0.5s steps(1) infinite;
    }
    @keyframes grainShift {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -10%); }
      30% { transform: translate(7%, -25%); }
      50% { transform: translate(-15%, 10%); }
      70% { transform: translate(0%, 15%); }
      90% { transform: translate(-10%, 10%); }
    }
    .content {
      position: relative; z-index: 1; text-align: center; padding: 2rem;
      max-width: 600px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(180deg, var(--color-accent) 0%, var(--color-text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 700;
      margin-bottom: 0.8rem;
    }
    .error-desc {
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.9rem 2.5rem; font-family: var(--font-body); font-size: 0.8rem;
      font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
      border-radius: 50px; cursor: pointer; transition: all 0.4s ease;
      color: var(--color-bg); background: var(--color-accent); border: 1px solid var(--color-accent);
      text-decoration: none;
    }
    .btn:hover {
      background: transparent; color: var(--color-accent);
      box-shadow: 0 0 30px rgba(224, 224, 224, 0.15);
    }
    .btn-outline {
      background: transparent; color: var(--color-text);
      border: 1px solid var(--color-border); margin-left: 0.8rem;
    }
    .btn-outline:hover {
      border-color: var(--color-accent); color: var(--color-accent);
    }
    @media (max-width: 480px) {
      .btn-outline { margin-left: 0; margin-top: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="grain-overlay"></div>
  <div class="content">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div>
      <a href="/" class="btn">Return Home</a>
      <a href="/#contact" class="btn btn-outline">Contact Me</a>
    </div>
  </div>
</body>
</html>
